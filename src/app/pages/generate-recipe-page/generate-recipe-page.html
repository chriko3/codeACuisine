<div class="generate-recipe">
  <div class="wrapper">
    <app-menu-bar-component></app-menu-bar-component>

    <div class="menu">
      <div class="head">
        <p>Generate recipe</p>
        <p>Got random stuff in your kitchen? Pop it in—we've got the perfect recipe waiting!</p>
      </div>

      <div class="input">
        <app-add-ingredients-component
          (ingredient)="onIngredientChange($event)"
          (amount)="onAmountChange($event)"
          (selected)="onSelectedChange($event)"
          (clicked)="addToIngredientsList()"
        ></app-add-ingredients-component>

        <app-ingredients-list-component
          [ingredientList]="ingredientList"
          (delete)="deleteIngredient($event)"
        ></app-ingredients-list-component>
      </div>
      <div class="bottom" [class.display-none]="!enoughtIngredients">
        <app-primary-button-component
          [text]="'Next step'"
          routerLink="/preferences"
        ></app-primary-button-component>
      </div>
    </div>
  </div>
</div>
